<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kyzen.id — Dev Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  .panel { max-width: 380px; width: 100%; padding: 36px 30px; }
  h1 {
    font-family: var(--k-font-display); font-size: 20px; margin: 14px 0 6px; color: var(--k-white);
    text-transform: none; letter-spacing: -0.01em;
  }
  p { color: var(--k-dim); font-size: 13px; margin: 0 0 22px; }
  input {
    width: 100%; background: var(--k-bg); border: 1px solid var(--k-border); border-radius: 2px;
    color: var(--k-white); font-family: var(--k-font-mono); font-size: 14px;
    padding: 12px 14px; margin-bottom: 14px; outline: none;
  }
  input:focus { border-color: var(--k-teal); }
  button { width: 100%; }
  .err { color: var(--k-danger); font-size: 12px; margin-top: 14px; display: none; }
</style>
</head>
<body class="k-theme">
  <div class="k-diamond-field"></div>
  <div class="panel k-card">
    <div class="k-badge">Access Locked</div>
    <h1>Dev Access</h1>
    <p>Masukkan dev key buat akses dashboard.</p>
    <input type="password" id="key" placeholder="dev key..." autofocus />
    <button class="k-btn" onclick="go()">Masuk</button>
    <div class="err" id="err">Key salah, coba lagi.</div>
  </div>
  <script>
    function go() {
      const key = document.getElementById('key').value.trim();
      if (!key) return;
      window.location.href = '/dev/dashboard?key=' + encodeURIComponent(key);
    }
    document.getElementById('key').addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
    if (new URLSearchParams(window.location.search).get('key')) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
