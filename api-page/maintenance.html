<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kyzen.id — Sedang Perbaikan</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2A2825;
    --bg-panel: #35322D;
    --hole: #1C1A17;
    --orange: #FF6B35;
    --yellow: #FFC145;
    --cream: #F2EDE4;
    --cream-dim: #B8B2A4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 24px 24px, var(--hole) 3px, transparent 3.5px) 0 0 / 48px 48px,
      var(--bg);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .panel {
    background: var(--bg-panel);
    border: 2px solid #423F38;
    border-radius: 6px;
    max-width: 480px;
    width: 100%;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
  }

  .hazard-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    border-radius: 6px 6px 0 0;
    background: repeating-linear-gradient(45deg, var(--yellow), var(--yellow) 12px, #1C1A17 12px, #1C1A17 24px);
  }

  .switch-icon {
    width: 64px;
    height: 64px;
    margin: 8px auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--hole);
    border: 3px solid var(--orange);
    position: relative;
  }

  .switch-icon::before {
    content: '';
    width: 6px;
    height: 22px;
    background: var(--orange);
    border-radius: 3px;
    animation: blink 1.6s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .label-tag {
    display: inline-block;
    background: var(--hole);
    color: var(--yellow);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    line-height: 1.2;
    margin: 0 0 12px;
    color: var(--cream);
  }

  p {
    color: var(--cream-dim);
    font-size: 14px;
    line-height: 1.7;
    margin: 0 0 24px;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--cream-dim);
    border-top: 1px dashed #4A473F;
    padding-top: 16px;
  }

  .meta b { color: var(--orange); }
</style>
</head>
<body>
  <div class="panel">
    <div class="hazard-strip"></div>
    <div class="switch-icon"></div>
    <div class="label-tag">Status &mdash; Trip / Off</div>
    <h1>Lagi ada perbaikan di panel.</h1>
    <p>Salah satu tools di Kyzen.id lagi di-service. Balik lagi sebentar lagi ya — biasanya nggak lama kok.</p>
    <div class="meta">
      <span>KYZEN.ID</span>
      <span><b>●</b> MAINTENANCE</span>
    </div>
  </div>
</body>
</html>
